<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repair Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.8.0/dist/alpine.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        c_intake: '#a855f7', c_ready: '#06b6d4', c_parts: '#f97316',
                        c_shop: '#3b82f6', c_done: '#10b981', c_road: '#8b5cf6'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        [x-cloak] { display: none !important; }

        /* Custom Scrollbar — matches Budget Portal */
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
        .custom-scroll:hover::-webkit-scrollbar-thumb { background: #9ca3af; }

        /* Kanban */
        .kanban-board { touch-action: pan-y; }
        .vehicle-card { transition: all 0.1s ease-in-out; animation: cardIn 0.3s ease both; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .vehicle-card:active { transform: scale(0.99); background-color: #f9fafb; }
        .vehicle-card.dragging { opacity: 0.4; transform: scale(0.97); border-style: dashed; border-color: #000; box-shadow: none; }
        .drag-over-column { border-color: #000 !important; background-color: #f9fafb !important; }
        .drop-indicator { height: 3px; background: #000; border-radius: 2px; margin: -1px 0; pointer-events: none; position: relative; z-index: 10; }

        /* Card Collapse */
        .card-body { max-height: 1000px; opacity: 1; transition: all 0.3s ease; overflow: hidden; }
        .vehicle-card.collapsed .card-body { max-height: 0 !important; opacity: 0; padding-top: 0; padding-bottom: 0; margin-top: 0; border-top-width: 0; }
        .vehicle-card.collapsed .collapse-toggle i { transform: rotate(-90deg); }

        /* Slide-over Panels */
        #logbookPanel, #bulletinPanel { transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); }
        #logbookPanel { transform: translateX(-100%); }
        #logbookPanel.open { transform: translateX(0); }
        #bulletinPanel { transform: translateX(100%); }
        #bulletinPanel.open { transform: translateX(0); }
        .overlay-bg { transition: opacity 0.3s ease; opacity: 0; pointer-events: none; }
        .overlay-bg.open { opacity: 1; pointer-events: all; }

        /* Mobile swiper dots */
        .swiper-dot { transition: all 0.3s ease; width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; position: relative; }
        .swiper-dot.active { width: 24px; border-radius: 4px; background: #000; }
        .swiper-dot::after { content: attr(data-count); position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; font-weight: 800; color: #6b7280; opacity: 0; transition: opacity 0.2s; }
        .swiper-dot.active::after { opacity: 1; }

        /* Print */
        @media print {
            body * { visibility: hidden !important; }
            .print-overlay, .print-overlay * { visibility: visible !important; }
            .print-overlay { position: absolute; top: 0; left: 0; background: #fff; width: 100%; }
            .print-actions { display: none !important; }
        }
    </style>
</head>
<body class="antialiased text-black bg-white flex h-screen overflow-hidden">

    <!-- Loading Shield — Budget Portal style (simple, clean) -->
    <div id="loading-shield" class="fixed inset-0 z-[200] flex items-center justify-center text-2xl font-semibold text-white bg-black transition-opacity duration-300">
        <div class="flex flex-col items-center gap-3">
            <i class="ph-fill ph-wrench text-4xl"></i>
            <span>Syncing Fleet...</span>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════
         SIDEBAR — Budget Portal: w-20 md:w-64
    ══════════════════════════════════════════════ -->
    <aside id="sidebar-primary" class="flex flex-col flex-shrink-0 w-1/12 bg-white border-r border-black z-30 overflow-x-hidden">

        <!-- Logo row -->
        <button onclick="void(0)" class="flex items-center justify-center md:justify-start md:px-6 h-16 border-b border-black flex-shrink-0 hover:bg-gray-50 transition-colors w-full cursor-default">
            <i class="ph-fill ph-wrench text-2xl text-black flex-shrink-0"></i>
            <span class="ml-3 text-lg font-bold hidden md:block">Fleet Tracker</span>
        </button>

        <!-- Primary actions -->
        <div class="p-2 space-y-1 border-b border-gray-200">
            <button onclick="openModal('add')" title="Add Unit"
                class="w-full flex items-center justify-center md:justify-start p-2 rounded-md hover:bg-gray-100 text-gray-600 hover:text-black transition-colors">
                <i class="ph-bold ph-plus-circle text-xl flex-shrink-0"></i>
                <span class="ml-3 text-xs font-bold hidden md:block">Add Unit</span>
            </button>
            <button onclick="openAddTicketModal()" title="Add Ticket"
                class="w-full flex items-center justify-center md:justify-start p-2 rounded-md hover:bg-gray-100 text-gray-600 hover:text-black transition-colors">
                <i class="ph-bold ph-ticket text-xl flex-shrink-0"></i>
                <span class="ml-3 text-xs font-bold hidden md:block">New Ticket</span>
            </button>
        </div>

        <!-- Tools -->
        <div class="p-2 space-y-1 border-b border-gray-200">
            <button onclick="toggleGlobalCollapse()" title="Collapse All"
                class="w-full flex items-center justify-center md:justify-start p-2 rounded-md hover:bg-gray-100 text-gray-600 hover:text-black transition-colors">
                <i class="ph-bold ph-arrows-in-line-vertical text-xl flex-shrink-0"></i>
                <span class="ml-3 text-xs font-bold hidden md:block">Collapse All</span>
            </button>
            <button onclick="printServiceTicketFromSearch()" title="Print Ticket"
                class="w-full flex items-center justify-center md:justify-start p-2 rounded-md hover:bg-gray-100 text-gray-600 hover:text-black transition-colors">
                <i class="ph-bold ph-printer text-xl flex-shrink-0"></i>
                <span class="ml-3 text-xs font-bold hidden md:block">Print Ticket</span>
            </button>
        </div>

        <!-- Spacer -->
        <div class="flex-1"></div>

        <!-- Panels -->
        <div class="p-2 space-y-1 border-t border-gray-200">
            <button onclick="toggleLogbook()" title="Logbook"
                class="w-full flex items-center justify-center md:justify-start p-2 rounded-md hover:bg-gray-100 text-gray-600 hover:text-black transition-colors">
                <i class="ph-bold ph-book-bookmark text-xl flex-shrink-0"></i>
                <span class="ml-3 text-xs font-bold hidden md:block">Logbook</span>
            </button>
            <button onclick="toggleBulletin()" id="bulletinToggle" title="Bulletin Board"
                class="w-full flex items-center justify-center md:justify-start p-2 rounded-md hover:bg-gray-100 text-gray-600 hover:text-black transition-colors relative">
                <i class="ph-bold ph-push-pin text-xl flex-shrink-0"></i>
                <span class="ml-3 text-xs font-bold hidden md:block">Bulletin</span>
                <span id="msgCount" class="absolute top-1 right-1 bg-red-600 text-white text-[9px] font-bold px-1.5 rounded-full shadow hidden">0</span>
            </button>
        </div>

        <!-- User footer — matches Budget Portal exactly -->
        <div class="p-4 border-t border-black flex items-center justify-center md:justify-between bg-white">
            <div class="h-8 w-8 rounded-full bg-black flex items-center justify-center text-white font-bold text-xs flex-shrink-0" id="sidebar-avatar">R</div>
            <div class="hidden md:flex flex-col ml-2 flex-1 min-w-0">
                <span id="sidebar-username" class="text-xs font-bold text-black truncate">Fleet Manager</span>
                <span class="text-[9px] uppercase tracking-wider text-gray-500">Repair Tracker</span>
            </div>
        </div>
    </aside>

    <!-- ══════════════════════════════════════════════
         MAIN
    ══════════════════════════════════════════════ -->
    <main class="flex-1 flex flex-col h-full overflow-hidden bg-white relative z-10">

        <!-- Header — Budget Portal style -->
        <header class="bg-white px-4 md:px-8 py-4 flex flex-col md:flex-row md:justify-between md:items-center border-b border-black shrink-0 gap-3">
            <div>
                <h1 class="text-2xl font-bold text-black tracking-tight">Fleet Tracker</h1>
                <p class="text-sm text-gray-500 mt-1" id="current-date-display">Live Data</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="relative w-full md:w-64">
                    <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Search vehicle or issue..." onkeyup="renderBoard()"
                        class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-0 focus:border-black transition-colors">
                </div>
            </div>
        </header>

        <!-- KPI Bar — Budget Portal flat card style -->
        <div class="flex gap-4 px-4 md:px-8 py-4 shrink-0 overflow-x-auto border-b border-black bg-white custom-scroll">
            <div class="bg-white border border-black rounded-lg p-4 min-w-[170px] flex-1">
                <dl>
                    <dt class="text-[10px] text-gray-400 uppercase font-bold tracking-wider mb-1">Reported</dt>
                    <dd class="text-3xl font-bold text-black mt-1 font-mono" id="kpi-total">0</dd>
                </dl>
            </div>
            <div class="bg-white border border-black rounded-lg p-4 min-w-[170px] flex-1">
                <dl>
                    <dt class="text-[10px] text-gray-400 uppercase font-bold tracking-wider mb-1">Ready for Pickup</dt>
                    <dd class="text-3xl font-bold text-black mt-1 font-mono" id="kpi-ready">0</dd>
                </dl>
            </div>
            <div class="bg-white border border-black rounded-lg p-4 min-w-[170px] flex-1">
                <dl>
                    <dt class="text-[10px] text-gray-400 uppercase font-bold tracking-wider mb-1">Parts Hold</dt>
                    <dd class="text-3xl font-bold text-black mt-1 font-mono" id="kpi-parts">0</dd>
                </dl>
            </div>
            <div class="bg-white border border-black rounded-lg p-4 min-w-[170px] flex-1">
                <dl>
                    <dt class="text-[10px] text-gray-400 uppercase font-bold tracking-wider mb-1">Completed</dt>
                    <dd class="text-3xl font-bold text-black mt-1 font-mono" id="kpi-complete">0</dd>
                </dl>
            </div>
        </div>

        <!-- Mobile swiper nav -->
        <div class="md:hidden flex items-center justify-evenly px-4 py-3 bg-white border-b border-gray-200 shrink-0">
            <button id="swiperPrev" onclick="swiperGo(-1)" class="w-8 h-8 flex items-center justify-center border border-gray-300 rounded-full hover:bg-gray-100 disabled:opacity-30"><i class="ph-bold ph-caret-left"></i></button>
            <div class="flex items-center gap-2" id="swiperDots"></div>
            <button id="swiperNext" onclick="swiperGo(1)" class="w-8 h-8 flex items-center justify-center border border-gray-300 rounded-full hover:bg-gray-100 disabled:opacity-30"><i class="ph-bold ph-caret-right"></i></button>
        </div>

        <!-- Kanban Board -->
        <div class="flex-1 flex md:gap-3 p-0 md:p-6 w-full overflow-x-hidden overflow-y-hidden custom-scroll kanban-board bg-white" id="kanbanBoard">

            <!-- On the Road -->
            <div class="kanban-column flex flex-col flex-1 min-w-0 bg-white md:border md:border-black md:rounded-lg overflow-hidden h-full transition-transform" data-col-type="on_the_road">
                <div class="bg-white px-4 py-3 border-b border-gray-200 flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-c_road"></div>
                        <h2 class="text-xs font-bold text-black uppercase tracking-wide">On the Road</h2>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleColumnCollapse(this)" class="text-gray-400 hover:text-black hidden md:block text-xs"><i class="ph-bold ph-minus"></i></button>
                        <span class="bg-gray-100 text-gray-600 text-xs font-mono px-2 py-0.5 rounded border border-gray-200" id="count-col-road">0</span>
                    </div>
                </div>
                <div class="column-content flex-1 overflow-y-auto p-3 space-y-2 custom-scroll" id="col-on-the-road" data-col="on_the_road"></div>
            </div>

            <!-- Complaints -->
            <div class="kanban-column flex flex-col flex-1 min-w-0 bg-white md:border md:border-black md:rounded-lg overflow-hidden h-full transition-transform">
                <div class="bg-white px-4 py-3 border-b border-gray-200 flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-c_intake"></div>
                        <h2 class="text-xs font-bold text-black uppercase tracking-wide">Complaints</h2>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleColumnCollapse(this)" class="text-gray-400 hover:text-black hidden md:block text-xs"><i class="ph-bold ph-minus"></i></button>
                        <span class="bg-gray-100 text-gray-600 text-xs font-mono px-2 py-0.5 rounded border border-gray-200" id="count-col-1">0</span>
                    </div>
                </div>
                <div class="column-content flex-1 overflow-y-auto p-3 space-y-2 custom-scroll" id="col-complaints" data-col="complaints"></div>
            </div>

            <!-- Ready for Pickup -->
            <div class="kanban-column flex flex-col flex-1 min-w-0 bg-white md:border md:border-black md:rounded-lg overflow-hidden h-full transition-transform">
                <div class="bg-white px-4 py-3 border-b border-gray-200 flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-c_ready"></div>
                        <h2 class="text-xs font-bold text-black uppercase tracking-wide">Ready for Pickup</h2>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleColumnCollapse(this)" class="text-gray-400 hover:text-black hidden md:block text-xs"><i class="ph-bold ph-minus"></i></button>
                        <span class="bg-gray-100 text-gray-600 text-xs font-mono px-2 py-0.5 rounded border border-gray-200" id="count-col-2">0</span>
                    </div>
                </div>
                <div class="column-content flex-1 overflow-y-auto p-3 space-y-2 custom-scroll" id="col-ready" data-col="ready"></div>
            </div>

            <!-- Parts Hold -->
            <div class="kanban-column flex flex-col flex-1 min-w-0 bg-white md:border md:border-black md:rounded-lg overflow-hidden h-full transition-transform">
                <div class="bg-white px-4 py-3 border-b border-gray-200 flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-c_parts"></div>
                        <h2 class="text-xs font-bold text-black uppercase tracking-wide">Parts Hold</h2>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleColumnCollapse(this)" class="text-gray-400 hover:text-black hidden md:block text-xs"><i class="ph-bold ph-minus"></i></button>
                        <span class="bg-gray-100 text-gray-600 text-xs font-mono px-2 py-0.5 rounded border border-gray-200" id="count-col-3">0</span>
                    </div>
                </div>
                <div class="column-content flex-1 overflow-y-auto p-3 space-y-2 custom-scroll" id="col-parts" data-col="parts"></div>
            </div>

            <!-- In Progress -->
            <div class="kanban-column flex flex-col flex-1 min-w-0 bg-white md:border md:border-black md:rounded-lg overflow-hidden h-full transition-transform">
                <div class="bg-white px-4 py-3 border-b border-gray-200 flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-c_shop"></div>
                        <h2 class="text-xs font-bold text-black uppercase tracking-wide">In Progress</h2>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleColumnCollapse(this)" class="text-gray-400 hover:text-black hidden md:block text-xs"><i class="ph-bold ph-minus"></i></button>
                        <span class="bg-gray-100 text-gray-600 text-xs font-mono px-2 py-0.5 rounded border border-gray-200" id="count-col-4">0</span>
                    </div>
                </div>
                <div class="column-content flex-1 overflow-y-auto p-3 space-y-2 custom-scroll" id="col-progress" data-col="progress"></div>
            </div>

            <!-- Returned -->
            <div class="kanban-column flex flex-col flex-1 min-w-0 bg-white md:border md:border-black md:rounded-lg overflow-hidden h-full transition-transform">
                <div class="bg-white px-4 py-3 border-b border-gray-200 flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-c_done"></div>
                        <h2 class="text-xs font-bold text-black uppercase tracking-wide">Returned</h2>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleColumnCollapse(this)" class="text-gray-400 hover:text-black hidden md:block text-xs"><i class="ph-bold ph-minus"></i></button>
                        <span class="bg-gray-100 text-gray-600 text-xs font-mono px-2 py-0.5 rounded border border-gray-200" id="count-col-5">0</span>
                    </div>
                </div>
                <div class="column-content flex-1 overflow-y-auto p-3 space-y-2 custom-scroll" id="col-returned" data-col="returned"></div>
            </div>

        </div>
    </main>

    <!-- ══════════════════════════════════════════════
         LOGBOOK PANEL
    ══════════════════════════════════════════════ -->
    <div class="overlay-bg fixed inset-0 bg-black/20 backdrop-blur-sm z-40" id="logbookOverlay" onclick="toggleLogbook()"></div>
    <div class="fixed top-0 left-0 h-full w-full max-w-md bg-white border-r border-black shadow-2xl z-50 flex flex-col" id="logbookPanel">
        <div class="flex justify-between items-center p-4 border-b border-gray-200 bg-gray-50">
            <div class="flex items-center gap-2">
                <i class="ph-bold ph-book-bookmark text-xl text-black"></i>
                <h2 class="text-sm font-bold uppercase tracking-wide text-black">Logbook</h2>
            </div>
            <button onclick="toggleLogbook()" class="text-gray-400 hover:text-black"><i class="ph-bold ph-x text-xl"></i></button>
        </div>
        <div class="flex gap-2 p-3 border-b border-gray-200">
            <button class="logbook-filter-btn px-3 py-1 text-xs font-bold rounded-md bg-black text-white" data-filter="all" onclick="setLogbookFilter('all',this)">All</button>
            <button class="logbook-filter-btn px-3 py-1 text-xs font-bold rounded-md border border-gray-200 text-gray-600 hover:bg-gray-50" data-filter="today" onclick="setLogbookFilter('today',this)">Today</button>
            <button class="logbook-filter-btn px-3 py-1 text-xs font-bold rounded-md border border-gray-200 text-gray-600 hover:bg-gray-50" data-filter="week" onclick="setLogbookFilter('week',this)">This Week</button>
        </div>
        <div class="flex-1 overflow-y-auto custom-scroll p-4 space-y-2 bg-gray-50" id="logbookFeed"></div>
    </div>

    <!-- ══════════════════════════════════════════════
         BULLETIN PANEL
    ══════════════════════════════════════════════ -->
    <div class="overlay-bg fixed inset-0 bg-black/20 backdrop-blur-sm z-40" id="bulletinOverlay" onclick="toggleBulletin()"></div>
    <div class="fixed top-0 right-0 h-full w-full max-w-md bg-white border-l border-black shadow-2xl z-50 flex flex-col" id="bulletinPanel">
        <div class="flex justify-between items-center p-4 border-b border-gray-200 bg-gray-50">
            <div class="flex items-center gap-2">
                <i class="ph-bold ph-push-pin text-xl text-black"></i>
                <h2 class="text-sm font-bold uppercase tracking-wide text-black">Bulletin Board</h2>
            </div>
            <button onclick="toggleBulletin()" class="text-gray-400 hover:text-black"><i class="ph-bold ph-x text-xl"></i></button>
        </div>
        <div class="p-4 border-b border-gray-200 bg-white">
            <div class="flex gap-2 mb-2">
                <input type="text" id="msgAuthor" placeholder="Your name..." class="flex-1 rounded-md border border-gray-300 p-2 text-sm focus:border-black focus:ring-0">
                <select id="msgPriority" class="rounded-md border border-gray-300 p-2 text-sm focus:border-black focus:ring-0">
                    <option value="fyi">FYI</option>
                    <option value="info" selected>Info</option>
                    <option value="heads-up">Heads Up</option>
                    <option value="urgent">Urgent</option>
                </select>
            </div>
            <textarea id="msgBody" placeholder="Post a message to the board..." rows="3" class="w-full rounded-md border border-gray-300 p-2 text-sm focus:border-black focus:ring-0 mb-2 resize-none"></textarea>
            <div class="flex justify-end">
                <button id="postBtn" onclick="postMessage()" class="px-4 py-2 bg-black text-white text-xs font-bold rounded-md disabled:opacity-50 hover:bg-gray-800" disabled>Post Message</button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto custom-scroll p-4 space-y-3 bg-gray-50" id="bulletinFeed"></div>
    </div>

    <!-- ══════════════════════════════════════════════
         ADD TICKET MODAL — Budget Portal modal style
    ══════════════════════════════════════════════ -->
    <div id="addTicketModal" class="fixed inset-0 z-[60] hidden">
        <div class="fixed inset-0 bg-black/20 backdrop-blur-sm" onclick="closeAddTicketModal()"></div>
        <div class="fixed inset-0 z-10 w-screen overflow-y-auto flex items-center justify-center p-4 pointer-events-none">
            <div class="bg-white w-full max-w-lg rounded-lg border border-black shadow-none p-6 pointer-events-auto">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-black">Add New Ticket</h3>
                    <button onclick="closeAddTicketModal()" class="text-gray-400 hover:text-black"><i class="ph-bold ph-x text-xl"></i></button>
                </div>

                <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-4">
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Your Name (For Logs)</label>
                    <input type="text" id="ticketUser" class="w-full rounded-md border border-gray-300 p-2 text-sm focus:border-black focus:ring-0" placeholder="E.g. Dispatcher Dave" required>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Vehicle ID</label>
                        <input type="text" id="ticketVehicleInput" list="ticketVehicleList" class="w-full rounded-md border border-gray-300 p-2 font-mono text-sm focus:border-black focus:ring-0 uppercase" placeholder="Type or select ID..." oninput="onTicketVehicleInput()" required>
                        <datalist id="ticketVehicleList"></datalist>
                    </div>

    <!-- ══════════════════════════════════════════════
         ALL JAVASCRIPT — completely unchanged except:
         • updateSidebarUser() added (sidebar user display)
         • card.className uses rounded-lg (visual only)
    ══════════════════════════════════════════════ -->
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVv34BESHIyT_-HohJ-gUc4a2QdQdwHOzEmxFtr1WFxjwV620spd3KnjyHd8If5HSfYQ/exec";
        let fleetData = [], collapsedCards = new Set();

        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCnH_ILuDyJB1mC0iBlrfYIAFVumD74yo4",
            authDomain: "dlx-dmt-tracker.firebaseapp.com",
            projectId: "dlx-dmt-tracker",
            storageBucket: "dlx-dmt-tracker.firebasestorage.app",
            messagingSenderId: "958627003202",
            appId: "1:958627003202:web:07ea8476831ef49e4ea6db",
            measurementId: "G-3XSEV0RBX0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let firestoreMap = {};
        let syntheticRowCounter = 1;

        // Sidebar user display sync
        function updateSidebarUser() {
            const name = localStorage.getItem('dlx_username') || 'Fleet Manager';
            const el = document.getElementById('sidebar-username');
            const av = document.getElementById('sidebar-avatar');
            if (el) el.textContent = name;
            if (av) av.textContent = name.charAt(0).toUpperCase();
        }

        function generateTicketId() {
            const d = new Date(), ds = d.toISOString().split('T')[0].replace(/-/g, ''), rand = Math.random().toString(36).substring(2, 6).toUpperCase();
            return 'TKT-' + ds + '-' + rand;
        }

        function transformFirestoreData(vehicleDocs) {
            const result = []; firestoreMap = {}; syntheticRowCounter = 1;
            vehicleDocs.forEach(vDoc => {
                const vData = vDoc.data(), vehicleId = vDoc.id, tickets = vData.tickets || [];
                if (tickets.length === 0) {
                    const rowIdx = syntheticRowCounter++;
                    firestoreMap[rowIdx] = { vehicleId, ticketId: null, ticketIndex: -1 };
                    result.push({
                        rowIndex: rowIdx, id: vehicleId, status: vData.status || 'Operational', vehicleType: vData.vehicleType || '',
                        homeLocation: vData.homeLocation || '', inspectionDate: vData.inspectionDate || '', location: vData.location || 'On the Road', onTheRoad: true,
                        issue: '', shopStatus: 'Complete', priority: 'Normal', date: '', requestedBy: '', notes: '', partsOrdered: '', partsEta: '', history: '[]'
                    });
                } else {
                    tickets.forEach((ticket, idx) => {
                        const rowIdx = syntheticRowCounter++;
                        firestoreMap[rowIdx] = { vehicleId, ticketId: ticket.ticketId, ticketIndex: idx };
                        result.push({
                            rowIndex: rowIdx, id: vehicleId, status: vData.status || 'Operational', vehicleType: vData.vehicleType || '',
                            homeLocation: vData.homeLocation || '', inspectionDate: vData.inspectionDate || '', location: vData.location || 'On the Road', onTheRoad: vData.onTheRoad || false,
                            issue: ticket.issue || '', shopStatus: ticket.shopStatus || 'Reported', priority: ticket.priority || 'Normal', date: ticket.date || '',
                            requestedBy: ticket.requestedBy || '', notes: ticket.notes || '', partsOrdered: ticket.partsOrdered || '', partsEta: ticket.partsEta || '',
                            history: JSON.stringify(ticket.history || [])
                        });
                    });
                }
            });
            return result;
        }

        let firestoreUnsubscribe = null;
        function initFirestoreListener() {
            if (firestoreUnsubscribe) firestoreUnsubscribe();
            firestoreUnsubscribe = db.collection('vehicles').onSnapshot(snapshot => {
                fleetData = transformFirestoreData(snapshot.docs);
                document.getElementById('loading-shield').classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => document.getElementById('loading-shield').classList.add('hidden'), 300);
                renderBoard();
            }, err => {
                console.error('Firestore listener error:', err);
                showToast('❌ Real-time sync error');
            });
        }

        function sheetBackupWrite(payload) {
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }).catch(err => console.warn('Sheet backup write failed:', err));
        }

        // ==================== DB WRITERS ====================
        function vehicleRef(vehicleId) { return db.collection('vehicles').doc(vehicleId.trim().toUpperCase()); }

        async function fsAddTicket(vehicleId, vehicleFields, ticketData) {
            const ref = vehicleRef(vehicleId), doc = await ref.get(), ticketId = generateTicketId(), newTicket = { ticketId, ...ticketData };
            if (doc.exists) {
                const existing = doc.data(), tickets = existing.tickets || []; tickets.push(newTicket);
                await ref.update({ ...vehicleFields, tickets, onTheRoad: false });
            } else { await ref.set({ ...vehicleFields, tickets: [newTicket], onTheRoad: false }); }
            return ticketId;
        }

        async function fsUpdateTicket(rowIndex, vehicleUpdates, ticketUpdates) {
            const mapping = firestoreMap[rowIndex]; if (!mapping) return;
            const ref = vehicleRef(mapping.vehicleId), doc = await ref.get(); if (!doc.exists) return;
            const data = doc.data(), tickets = data.tickets || [], tIdx = tickets.findIndex(t => t.ticketId === mapping.ticketId);
            if (tIdx >= 0) tickets[tIdx] = { ...tickets[tIdx], ...ticketUpdates };
            await ref.update({ ...vehicleUpdates, tickets });
        }

        async function fsBulkUpdateVehicle(vehicleId, vehicleUpdates, ticketUpdates) {
            const ref = vehicleRef(vehicleId), doc = await ref.get(); if (!doc.exists) return;
            const data = doc.data(), tickets = (data.tickets || []).map(t => { if (t.shopStatus === 'Complete') return t; return { ...t, ...ticketUpdates }; });
            await ref.update({ ...vehicleUpdates, tickets });
        }

        async function fsCloseTicket(vehicleId, ticketId, user) {
            const ref = vehicleRef(vehicleId), doc = await ref.get(); if (!doc.exists) return;
            const data = doc.data(), tickets = (data.tickets || []).map(t => {
                if (t.ticketId !== ticketId) return t;
                const hist = Array.isArray(t.history) ? t.history : []; hist.push({ ts: Date.now(), user, action: 'Closed', desc: 'Ticket closed' });
                return { ...t, shopStatus: 'Complete', history: hist };
            });
            const stillActive = tickets.some(t => t.shopStatus !== 'Complete');
            await ref.update({ status: stillActive ? data.status : 'Operational', location: stillActive ? data.location : 'On the Road', onTheRoad: !stillActive, tickets });
        }

        async function fsCloseAndReturnToRoad(vehicleId, user) {
            const ref = vehicleRef(vehicleId), doc = await ref.get(); if (!doc.exists) return;
            const data = doc.data(), tickets = (data.tickets || []).map(t => {
                if (t.shopStatus === 'Complete') return t;
                const hist = Array.isArray(t.history) ? t.history : []; hist.push({ ts: Date.now(), user, action: 'Closed', desc: 'Ticket closed, returned to On the Road' });
                return { ...t, shopStatus: 'Complete', history: hist };
            });
            await ref.update({ status: 'Operational', location: 'On the Road', onTheRoad: true, tickets });
        }

        async function fsDeleteTicket(rowIndex) {
            const mapping = firestoreMap[rowIndex]; if (!mapping) return;
            const ref = vehicleRef(mapping.vehicleId), doc = await ref.get(); if (!doc.exists) return;
            const data = doc.data(), tickets = (data.tickets || []).filter(t => t.ticketId !== mapping.ticketId);
            if (tickets.length === 0) await ref.delete(); else await ref.update({ tickets });
        }

        const COLUMN_STATUSES = {
            on_the_road: [], complaints: ["Reported"], ready: ["Ready for Pickup", "Dispatched to Shop"],
            parts: ["Awaiting part order", "Assessment"], progress: ["Received", "Parts Received - Waiting for Technician", "Repair in Progress", "Ready for Delivery"], returned: ["Complete"]
        };

        function statusToCol(status, onTheRoad) {
            if (onTheRoad === true) return 'on_the_road';
            for (const [c, sts] of Object.entries(COLUMN_STATUSES)) { if (sts.includes(status)) return c; } return 'complaints';
        }

        function toggleGlobalCollapse() {
            const cards = document.querySelectorAll('.vehicle-card'), anyOpen = [...cards].some(c => !c.classList.contains('collapsed'));
            cards.forEach(c => { const k = c.dataset.cardKey; if(anyOpen) { c.classList.add('collapsed'); collapsedCards.add(k); } else { c.classList.remove('collapsed'); collapsedCards.delete(k); } });
        }

        function getUsername() { return document.getElementById('currentUser').value.trim() || localStorage.getItem('dlx_username') || "Unknown"; }
        function createLogEntry(action, desc) { return { ts: Date.now(), user: getUsername(), action: action, desc: desc }; }
        function parseHistory(jsonStr) { try { return jsonStr ? JSON.parse(jsonStr) : []; } catch(e) { return []; } }

        function renderHistoryLog(historyArray) {
            const list = document.getElementById('historyList');
            if(!historyArray || historyArray.length === 0) { list.innerHTML = '<div class="text-center text-gray-400 p-2 italic">No history recorded</div>'; return; }
            const sorted = [...historyArray].sort((a,b) => b.ts - a.ts);
            list.innerHTML = sorted.map(h => {
                const d = new Date(h.ts), timeStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                return `<div class="flex gap-2 py-1 border-b border-gray-100 last:border-0"><div class="text-gray-400 font-mono shrink-0">${timeStr}</div><div class="font-bold text-black shrink-0">${h.user}:</div><div class="text-gray-700">${h.desc}</div></div>`;
            }).join('');
        }

        // ==================== MOBILE SWIPER ====================
        let swiperIndex = 0;
        function isMobile() { return window.innerWidth <= 768; }

        function initSwiperDots() {
            const container = document.getElementById('swiperDots'); container.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const dot = document.createElement('button'); dot.className = 'swiper-dot' + (i === swiperIndex ? ' active' : '');
                dot.dataset.count = ''; dot.onclick = () => swiperGoTo(i); container.appendChild(dot);
            }
            updateSwiperUI();
        }

        function updateSwiperUI() {
            if (!isMobile()) return;
            const dots = document.querySelectorAll('.swiper-dot'), columns = document.querySelectorAll('.kanban-column');
            const counts = ['road','1','2','3','4','5'].map(id => document.getElementById('count-col-'+id)?.textContent || '0');
            dots.forEach((dot, i) => { dot.classList.toggle('active', i === swiperIndex); dot.dataset.count = counts[i]; });
            columns.forEach((col, i) => { col.style.transform = `translateX(${-swiperIndex * 100}%)`; });
            const p = document.getElementById('swiperPrev'), n = document.getElementById('swiperNext');
            if(p) p.disabled = swiperIndex === 0; if(n) n.disabled = swiperIndex === 5;
        }
        function swiperGo(dir) { const next = swiperIndex + dir; if (next >= 0 && next <= 5) swiperGoTo(next); }
        function swiperGoTo(idx) { swiperIndex = Math.max(0, Math.min(5, idx)); updateSwiperUI(); }

        let touchStartX = 0, touchStartY = 0, touchDeltaX = 0, isSwiping = false;
        document.getElementById('kanbanBoard').addEventListener('touchstart', e => { if(!isMobile()) return; touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; isSwiping = false; }, {passive:true});
        document.getElementById('kanbanBoard').addEventListener('touchmove', e => { if(!isMobile()) return; const dX = e.touches[0].clientX - touchStartX, dY = e.touches[0].clientY - touchStartY; if(!isSwiping && Math.abs(dX) > 10 && Math.abs(dX) > Math.abs(dY)*1.2) isSwiping = true; if(isSwiping) { e.preventDefault(); touchDeltaX = dX; document.querySelectorAll('.kanban-column').forEach(c => { c.style.transition='none'; c.style.transform=`translateX(calc(${-swiperIndex * 100}% + ${dX}px))`; }); } }, {passive:false});
        document.getElementById('kanbanBoard').addEventListener('touchend', e => { if(!isMobile() || !isSwiping) return; document.querySelectorAll('.kanban-column').forEach(c => c.style.transition='transform 0.35s cubic-bezier(0.16,1,0.3,1)'); if(Math.abs(touchDeltaX) > 50) { if(touchDeltaX > 0 && swiperIndex > 0) swiperIndex--; else if(touchDeltaX < 0 && swiperIndex < 5) swiperIndex++; } updateSwiperUI(); isSwiping=false; touchDeltaX=0; }, {passive:true});

        function printServiceTicketFromSearch() { const search = document.getElementById('searchInput').value.trim(); if (!search) { showToast('Enter Vehicle ID to search first'); return; } const matches = fleetData.filter(v => v.id.toLowerCase().includes(search.toLowerCase())); if (!matches.length) { showToast('❌ No matches'); return; } const id = matches[0].id; const allTickets = fleetData.filter(v => v.id.trim().toUpperCase() === id.trim().toUpperCase()); showPrintPreview(allTickets[0], allTickets); }

        // ==================== UTILITIES ====================
        function showToast(msg) { document.querySelectorAll('.toast').forEach(e => e.remove()); const t = document.createElement('div'); t.className = 'toast fixed bottom-6 right-6 bg-black text-white px-4 py-3 rounded-lg shadow-2xl font-bold text-sm z-[300] flex items-center gap-2'; t.innerHTML = `<i class="ph-bold ph-info text-lg"></i>${msg}`; document.body.appendChild(t); setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s ease'; setTimeout(()=>t.remove(),300); }, 3000); }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeAddTicketModal(); document.querySelectorAll('.print-overlay').forEach(el => el.remove()); const lp = document.getElementById('logbookPanel'); if(lp && lp.classList.contains('open')) toggleLogbook(); const bp = document.getElementById('bulletinPanel'); if(bp && bp.classList.contains('open')) toggleBulletin(); } });

        setInterval(() => { const el = document.getElementById('current-date-display'); if(el) el.textContent = new Date().toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'}); }, 60000);
        document.getElementById('current-date-display').textContent = new Date().toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'});

        // Init
        initSwiperDots();
        initFirestoreListener();
        loadBulletin();
        updateSidebarUser();
    </script>
</body>
</html>
